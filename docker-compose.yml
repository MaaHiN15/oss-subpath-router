services:
  nginx:
    image: nginx:1.29.6
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - oss-net
    depends_on:
      - alertmanager
      - consul
      - grafana
      - jenkins
      - kafka-ui
      - minio
      - nexus
      - prometheus
      - temporal
      - traefik

  alertmanager:
    image: prom/alertmanager:v0.31.1
    container_name: alertmanager
    restart: always
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--web.external-url=http://localhost/alertmanager'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager/config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - oss-net

  consul:
    image: hashicorp/consul:1.22
    container_name: consul
    restart: always
    command:
      - 'agent'
      - '-dev'
      - '-client=0.0.0.0'
      - '-ui-content-path=/consul/'
    networks:
      - oss-net

  grafana:
    image: grafana/grafana:12.3
    container_name: grafana
    restart: always
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - oss-net

  jenkins:
    image: jenkins/jenkins:2.554
    container_name: jenkins
    restart: always
    environment:
      - JENKINS_OPTS=--prefix=/jenkins
    volumes:
      - jenkins_data:/var/jenkins_home
    networks:
      - oss-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: always
    environment:
      - SERVER_SERVLET_CONTEXT_PATH=/kafka
    networks:
      - oss-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: always
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_BROWSER_REDIRECT_URL=http://localhost/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - oss-net

  nexus:
    image: sonatype/nexus3:3.90.1
    container_name: nexus
    restart: always
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms1024m -Xmx1024m -Dnexus-context-path=/nexus
    volumes:
      - nexus_data:/nexus-data
    networks:
      - oss-net

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=http://localhost/prometheus'
      - '--web.route-prefix=/'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - oss-net

  temporal:
    image: temporalio/ui:2.47.3
    container_name: temporal
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal-server:7233
    networks:
      - oss-net

  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: always
    command:
      - '--api=true'
      - '--api.dashboard=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - oss-net

volumes:
  alertmanager_data:
  grafana_data:
  jenkins_data:
  minio_data:
  nexus_data:
  prometheus_data:

networks:
  oss-net:
    driver: bridge
